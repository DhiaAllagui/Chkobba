<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chkobba — Menu</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="menu-page">
  <div class="menu-wrap">
    <p class="menu-ornament">Chakkeb: Win ma t7eb, wa9t ma t7eb.</p>
    <h1 class="menu-title">CHKOBBA</h1>
    <p class="menu-subtitle">لعبة الشكوبة التونسية</p>
    <div class="menu-divider"></div>

    <!-- Profile Upload Section -->
    <div class="profile-section">
      <div class="avatar-wrapper" onclick="document.getElementById('pfpInput').click()">
        <img id="pfpPreview" src="../img/pfp.jpg" alt="Profile">
        <div class="avatar-overlay"><span>CHANGE</span></div>
      </div>
      <input type="file" id="pfpInput" accept="image/*" style="display:none">
      <div class="profile-welcome">Welcome, <span id="welcome-name" style="color:var(--gold)">Player</span></div>
    </div>

    <div class="menu-settings">
      <div class="settings-row">
        <span class="settings-label">USERNAME</span>
        <input class="settings-input" id="menu-username" type="text" placeholder="Your name…" maxlength="20">
      </div>
      <div class="settings-row">
        <span class="settings-label">BOT DIFFICULTY</span>
        <select class="settings-input" id="menu-difficulty">
          <option value="easy">Ka3ba lee</option>
          <option value="medium" selected>Yaadi ro7ou</option>
          <option value="hard">Mle3bi</option>
          <option value="expert">Lpatron</option>
        </select>
      </div>
      <div class="settings-row">
        <span class="settings-label">TARGET SCORE</span>
        <select class="settings-input" id="menu-target-score">
          <option value="21" selected>21 Points (Classic)</option>
          <option value="11">11 Points (Blitz)</option>
        </select>
      </div>
      <div class="settings-row">
        <span class="settings-label">CARD BACK</span>
        <div class="back-carousel-container">
          <button class="carousel-arrow" id="prev-back" onclick="moveCarousel(-1)">&#8249;</button>
          <div class="carousel-viewport">
            <div class="back-picker" id="back-picker">
              <img class="back-option selected" src="../cards/back.png" data-back="back.png" title="Default">
              <img class="back-option" src="../cards/back1.png" data-back="back1.png" title="Blue">
              <img class="back-option" src="../cards/back2.png" data-back="back2.png" title="Majestic">
              <img class="back-option" src="../cards/back3.png" data-back="back3.png" title="Vintage">
              <img class="back-option" src="../cards/back4.png" data-back="back4.png" title="Modern">
              <img class="back-option" src="../cards/back5.png" data-back="back5.png" title="Golden">
              <img class="back-option" src="../cards/back6.png" data-back="back6.png" title="Tunisia">
              <img class="back-option" src="../cards/back8.png" data-back="back8.png" title="Palestine">
            </div>
          </div>
          <button class="carousel-arrow" id="next-back" onclick="moveCarousel(1)">&#8250;</button>
        </div>
      </div>
      <div class="settings-row">
        <label class="settings-check-label">
          <input type="checkbox" id="menu-sfx" checked>
          <span class="settings-check-custom"></span>
          <span class="sound-label"><img class="icon-vol" src="../img/volumeup.png" alt="Vol"> Enable Sound Effects</span>
        </label>
      </div>
      <div class="settings-row" style="justify-content: center; margin-top: 15px;">
        <button class="rule-menu-btn" onclick="showRules()">How to Play / كيفاش نلعب</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="menu-btn" onclick="launch('single')">🤖 Single Player</button>
      <button class="menu-btn" onclick="window.location.href='/lobby.html'">🌐 Multiplayer</button>
    </div>
  </div>

  <!-- Tunisian Café Radio Widget (FAB) -->
  <div class="radio-widget" id="radio-widget">
    <button class="radio-fab" id="radio-fab-btn" title="Café Radio" aria-label="Toggle radio">
      <img src="../img/radio.png" alt="Radio">
    </button>
    <div class="radio-panel" id="radio-panel">
      <div class="radio-header">
        <img class="radio-logo" src="../img/radio.png" alt="Radio">
        <span class="radio-label">Café Radio</span>
        <div class="radio-waves">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div class="radio-now-playing" id="radio-now-playing">Off Air</div>
      <div class="radio-controls">
        <button class="radio-btn" id="radio-prev-btn" title="Previous">⏮</button>
        <button class="radio-btn" id="radio-play-btn" title="Play / Pause">▶</button>
        <button class="radio-btn" id="radio-next-btn" title="Skip">⏭</button>
      </div>
      <div class="radio-vol-row">
        <img class="radio-vol-icon" src="../img/volumedown.png" alt="Vol-">
        <input type="range" id="radio-vol-slider" min="0" max="100" value="60" title="Volume">
        <button class="radio-btn radio-mute-btn" id="radio-mute-btn" title="Mute">
          <img src="../img/volumeup.png" alt="Mute" style="width:14px;height:14px;object-fit:contain;">
        </button>
      </div>
    </div>
  </div>

  <!-- ── RULES MODAL ── -->
  <div class="modal-overlay" id="rulesModal">
    <div class="modal-window">
      <div class="modal-header">
        <div class="modal-lang-toggle">
          <button class="lang-btn active" id="btn-lang-en" onclick="setRulesLang('en')">English</button>
          <button class="lang-btn" id="btn-lang-tn" onclick="setRulesLang('tn')">Derja</button>
        </div>
        <button class="modal-close" onclick="closeRules()">&times;</button>
      </div>
      <div class="modal-body" id="rulesBody">
        <h2 class="modal-title" id="rulesTitle"></h2>
        <p style="text-align:center; font-style:italic; margin-bottom: 24px; opacity:0.8;" id="rulesIntro"></p>
        <div id="rulesSections"></div>
      </div>
    </div>
  </div>

  <script src="../js/rules.js"></script>
  <script>
    let currentRulesLang = localStorage.getItem('chkobba_rules_lang') || 'en';

    function showRules() {
      renderRules(currentRulesLang);
      document.getElementById('rulesModal').classList.add('show');
    }

    function closeRules() {
      document.getElementById('rulesModal').classList.remove('show');
    }

    function setRulesLang(lang) {
      currentRulesLang = lang;
      localStorage.setItem('chkobba_rules_lang', lang);
      renderRules(lang);
    }

    function renderRules(lang) {
      const data = RULES_CONTENT[lang];
      document.getElementById('rulesTitle').textContent = data.title;
      document.getElementById('rulesIntro').textContent = data.intro;

      const sectionsDiv = document.getElementById('rulesSections');
      sectionsDiv.innerHTML = '';

      data.sections.forEach(sec => {
        const wrap = document.createElement('div');
        wrap.className = 'rules-section';
        wrap.innerHTML = `
          <h3 class="rules-header">${sec.header}</h3>
          <div class="rules-text">${sec.content}</div>
        `;
        sectionsDiv.appendChild(wrap);
      });

      // Update buttons
      document.getElementById('btn-lang-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-lang-tn').classList.toggle('active', lang === 'tn');
    }

    // Close on overlay click
    document.getElementById('rulesModal').onclick = (e) => {
      if (e.target.id === 'rulesModal') closeRules();
    };

    // Back picker interaction
    document.querySelectorAll('.back-option').forEach(img => {
      img.addEventListener('click', () => {
        document.querySelectorAll('.back-option').forEach(i => i.classList.remove('selected'));
        img.classList.add('selected');
      });
    });

    let carouselOffset = 0;
    const cardLimit = 1;
    const cardWidth = 120 + 10;

    function moveCarousel(direction) {
      const picker = document.getElementById('back-picker');
      const maxOffset = picker.children.length - cardLimit;
      carouselOffset += direction;
      if (carouselOffset < 0) carouselOffset = 0;
      if (carouselOffset > maxOffset) carouselOffset = maxOffset;
      picker.style.transform = `translateX(${-carouselOffset * cardWidth}px)`;
      updateCarouselArrows(maxOffset);
    }

    function updateCarouselArrows(maxOffset) {
      document.getElementById('prev-back').disabled = (carouselOffset === 0);
      document.getElementById('next-back').disabled = (carouselOffset >= maxOffset);
    }

    window.addEventListener('DOMContentLoaded', () => {
      const picker = document.getElementById('back-picker');
      updateCarouselArrows(picker.children.length - cardLimit);
    });

    // Profile Picture logic
    const pfpInput = document.getElementById('pfpInput');
    const pfpPreview = document.getElementById('pfpPreview');
    const welcomeName = document.getElementById('welcome-name');
    const menuUsername = document.getElementById('menu-username');

    // Load saved PFP
    const savedPfp = localStorage.getItem('chkobba_user_pfp');
    if (savedPfp) pfpPreview.src = savedPfp;

    pfpInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const base64 = event.target.result;
          pfpPreview.src = base64;
          localStorage.setItem('chkobba_user_pfp', base64);
        };
        reader.readAsDataURL(file);
      }
    });

    menuUsername.oninput = () => {
      const val = menuUsername.value.trim();
      welcomeName.textContent = val || 'Player';
      localStorage.setItem('chkobba_username', val);
    };

    // Load saved username
    const savedUsername = localStorage.getItem('chkobba_username') || '';
    if (savedUsername) {
      menuUsername.value = savedUsername;
      welcomeName.textContent = savedUsername;
    }

    function launch(mode) {
      const name = document.getElementById('menu-username').value.trim();
      const diff = document.getElementById('menu-difficulty').value;
      const back = document.querySelector('.back-option.selected')?.dataset.back || 'back.png';
      const sfx = document.getElementById('menu-sfx').checked ? '1' : '0';
      const score = document.getElementById('menu-target-score').value;
 
      const params = new URLSearchParams({ mode, name, diff, back, sfx, targetScore: score });
      window.location.href = `chkobba.html?${params.toString()}`;
    }
  </script>
  <script src="../js/radio.js"></script>
</body>

</html>
